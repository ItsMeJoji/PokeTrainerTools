<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PokeTrainer Tools</title>
  <script>
    // GitHub Pages SPA redirect:
    // /some/route?x=1 -> /?p=/some/route&q=x=1
    (function () {
      var l = window.location;
      var repoBasePath = '/PokeTrainerTools';
      var isGithubIoHost = l.hostname.endsWith('.github.io');
      var isProjectPages = isGithubIoHost && l.pathname.toLowerCase().startsWith(repoBasePath.toLowerCase() + '/');
      var segmentCount = isProjectPages ? 1 : 0;

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }());
  </script>
</head>
<body></body>
</html>
